<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>별똥별 잡기 게임</title>
  <style>
    :root {
      --bg1: #101533;
      --bg2: #232b69;
      --panel: rgba(255,255,255,0.14);
      --panel-border: rgba(255,255,255,0.28);
      --text: #ffffff;
      --yellow: #ffd95e;
      --pink: #ff9ccc;
      --mint: #a2ffe2;
      --shadow: rgba(0,0,0,0.22);
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Courier New", monospace;
      image-rendering: pixelated;
      background: linear-gradient(to bottom, var(--bg1), var(--bg2));
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,0.9) 0 1px, transparent 2px),
        radial-gradient(circle at 74% 14%, rgba(255,255,255,0.7) 0 1px, transparent 2px),
        radial-gradient(circle at 28% 72%, rgba(255,255,255,0.8) 0 1px, transparent 2px),
        radial-gradient(circle at 80% 58%, rgba(255,255,255,0.8) 0 1px, transparent 2px),
        radial-gradient(circle at 46% 34%, rgba(255,255,255,0.65) 0 1px, transparent 2px);
      background-size: 240px 240px;
      opacity: 0.55;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .hud {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 30;
    }

    .panel {
      min-width: 110px;
      padding: 10px 14px;
      text-align: center;
      background: var(--panel);
      border: 3px solid var(--panel-border);
      box-shadow: 0 6px 0 var(--shadow);
    }

    .label {
      font-size: 12px;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .value {
      font-size: 22px;
      font-weight: bold;
      line-height: 1;
    }

    #wishText {
      position: absolute;
      left: 50%;
      top: 24%;
      transform: translateX(-50%);
      font-size: clamp(18px, 4vw, 30px);
      font-weight: bold;
      color: var(--pink);
      text-shadow: 2px 2px 0 rgba(0,0,0,0.25);
      opacity: 0;
      pointer-events: none;
      z-index: 40;
    }

    #wishText.show {
      animation: wishPop 0.9s ease-out;
    }

    @keyframes wishPop {
      0% { opacity: 0; transform: translateX(-50%) translateY(12px) scale(0.8); }
      25% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.05); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-18px) scale(1); }
    }

    .star {
      position: absolute;
      width: 28px;
      height: 28px;
      z-index: 20;
      cursor: pointer;
      animation-name: fall;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
      filter: drop-shadow(0 0 8px rgba(255, 232, 130, 0.55));
    }

    .star::before {
      content: "";
      position: absolute;
      left: -24px;
      top: 12px;
      width: 24px;
      height: 4px;
      background: linear-gradient(to left, rgba(255,255,255,0.95), rgba(255,255,255,0));
    }

    .star-shape {
      position: absolute;
      inset: 0;
      background: var(--yellow);
      clip-path: polygon(
        50% 0%, 61% 36%, 100% 36%, 68% 57%,
        80% 100%, 50% 73%, 20% 100%, 32% 57%,
        0% 36%, 39% 36%
      );
      box-shadow:
        inset -4px -4px 0 rgba(255, 186, 59, 0.75),
        inset 4px 4px 0 rgba(255, 245, 190, 0.88);
      animation: twinkle 0.45s steps(2) infinite alternate;
    }

    @keyframes twinkle {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    @keyframes fall {
      from {
        transform: translate(0, -60px) rotate(0deg);
      }
      to {
        transform: translate(var(--drift), 110vh) rotate(var(--rotate));
      }
    }

    .hit {
      animation: popOut 0.18s steps(2) forwards !important;
    }

    @keyframes popOut {
      from { transform: scale(1); opacity: 1; }
      to { transform: scale(1.8); opacity: 0; }
    }

    .pixel-cloud {
      position: absolute;
      bottom: 28px;
      width: 140px;
      height: 56px;
      background:
        linear-gradient(#ffffff 0 0) 18px 14px / 22px 22px no-repeat,
        linear-gradient(#ffffff 0 0) 34px 6px / 26px 26px no-repeat,
        linear-gradient(#ffffff 0 0) 54px 14px / 22px 22px no-repeat,
        linear-gradient(#ffffff 0 0) 70px 20px / 26px 20px no-repeat,
        linear-gradient(#ffffff 0 0) 10px 24px / 100px 18px no-repeat;
      opacity: 0.13;
      pointer-events: none;
    }

    .cloud1 { left: 6%; }
    .cloud2 { right: 8%; bottom: 70px; transform: scale(0.92); }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(9, 12, 38, 0.38);
      z-index: 50;
    }

    .card {
      width: min(90vw, 400px);
      padding: 24px 20px;
      text-align: center;
      background: rgba(25, 31, 84, 0.96);
      border: 4px solid rgba(255,255,255,0.25);
      box-shadow: 0 10px 0 rgba(0,0,0,0.24);
    }

    .card h1 {
      margin: 0 0 12px;
      font-size: clamp(24px, 4vw, 34px);
      color: var(--yellow);
    }

    .card p {
      margin: 8px 0;
      font-size: 14px;
      line-height: 1.6;
    }

    .btn {
      margin-top: 16px;
      padding: 12px 18px;
      border: 0;
      background: var(--mint);
      color: #13213f;
      font-family: inherit;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,0.24);
    }

    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 rgba(0,0,0,0.24);
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="game">
    <div class="hud">
      <div class="panel">
        <div class="label">SCORE</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="panel">
        <div class="label">TIME</div>
        <div class="value" id="time">20</div>
      </div>
    </div>

    <div id="wishText">Make a wish!</div>

    <div class="pixel-cloud cloud1"></div>
    <div class="pixel-cloud cloud2"></div>

    <div class="overlay hidden" id="endOverlay">
      <div class="card">
        <h1>🌙 게임 종료</h1>
        <p>최종 점수: <strong id="finalScore">0</strong></p>
        <p>다시 시작해서 더 많은 별을 잡아보세요!</p>
        <button class="btn" id="restartBtn">다시 하기</button>
      </div>
    </div>
  </div>

  <script>
    const game = document.getElementById('game');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const wishText = document.getElementById('wishText');
    const endOverlay = document.getElementById('endOverlay');
    const finalScore = document.getElementById('finalScore');
    const restartBtn = document.getElementById('restartBtn');

    let score = 0;
    let timeLeft = 20;
    let gameRunning = false;
    let spawnInterval = null;
    let timerInterval = null;

    function updateHUD() {
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
    }

    function showWishText() {
      wishText.classList.remove('show');
      void wishText.offsetWidth;
      wishText.classList.add('show');
    }

    function clearStars() {
      document.querySelectorAll('.star').forEach(star => star.remove());
    }

    function removeStar(star) {
      if (star && star.parentNode) {
        star.parentNode.removeChild(star);
      }
    }

    function createStar() {
      if (!gameRunning) return;

      const star = document.createElement('div');
      const shape = document.createElement('div');
      star.className = 'star';
      shape.className = 'star-shape';
      star.appendChild(shape);

      const size = Math.floor(Math.random() * 14) + 24;
      const left = Math.max(10, Math.floor(Math.random() * (window.innerWidth - 60)));
      const duration = (Math.random() * 1.8 + 2.2).toFixed(2);
      const drift = Math.floor((Math.random() - 0.5) * 160) + 'px';
      const rotate = (Math.random() * 80 - 40).toFixed(0) + 'deg';

      star.style.left = left + 'px';
      star.style.top = '-20px';
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.setProperty('--drift', drift);
      star.style.setProperty('--rotate', rotate);
      star.style.animationDuration = duration + 's';

      const hitStar = () => {
        if (!gameRunning || star.dataset.hit === '1') return;
        star.dataset.hit = '1';
        score += 1;
        updateHUD();
        showWishText();
        star.classList.add('hit');
        setTimeout(() => removeStar(star), 180);
      };

      star.addEventListener('click', hitStar);
      star.addEventListener('touchstart', function (e) {
        e.preventDefault();
        hitStar();
      }, { passive: false });

      star.addEventListener('animationend', function () {
        removeStar(star);
      });

      game.appendChild(star);
    }

    function endGame() {
      gameRunning = false;
      clearInterval(spawnInterval);
      clearInterval(timerInterval);
      clearStars();
      finalScore.textContent = score;
      endOverlay.classList.remove('hidden');
    }

    function startGame() {
      clearInterval(spawnInterval);
      clearInterval(timerInterval);
      clearStars();

      score = 0;
      timeLeft = 20;
      gameRunning = true;
      endOverlay.classList.add('hidden');
      updateHUD();

      for (let i = 0; i < 3; i += 1) {
        setTimeout(createStar, i * 180);
      }

      spawnInterval = setInterval(function () {
        createStar();
        if (Math.random() < 0.3) {
          setTimeout(createStar, 150);
        }
      }, 500);

      timerInterval = setInterval(function () {
        timeLeft -= 1;
        updateHUD();
        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    restartBtn.addEventListener('click', startGame);
    window.addEventListener('resize', updateHUD);

    updateHUD();
    window.addEventListener('load', startGame);
    setTimeout(startGame, 200);
  </script>
</body>
</html>
