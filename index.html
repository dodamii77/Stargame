<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>별똥별 잡기 🌟</title>
<style>
  :root{
    --bg-top:#0b1022;
    --bg-btm:#1a2649;
    --accent:#ffd83d;     /* 별 본체 */
    --accent-edge:#f5c400;/* 별 외곽 픽셀 */
    --ui:#ffffff;
    --pink:#ff7aa2;
    --green:#7affbf;
  }

  /* 기본 레이아웃 */
  body{
    margin:0;
    height:100dvh;
    display:grid;
    place-items:center;
    background:
      radial-gradient(1200px 600px at 70% 10%, #1b1b3f 0 40%, transparent 60%),
      linear-gradient(var(--bg-top),var(--bg-btm));
    font-family: system-ui, -apple-system, Segoe UI, Roboto, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    color:var(--ui);
    overflow:hidden;
    user-select:none;
  }
  #game{
    position:relative;
    width:min(92vw, 560px);
    aspect-ratio: 9/16;          /* 세로형 화면 */
    border:4px solid #2a355f;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.45), inset 0 0 0 2px #0b102255;
    background:
      repeating-linear-gradient(0deg, #ffffff07 0 1px, transparent 1px 8px),
      linear-gradient(180deg, #0d1533 0%, #0d173a 40%, #111b45 70%, #0c1230 100%);
    image-rendering: pixelated; /* 도트 느낌 강화 */
    overflow:hidden;
  }

  /* HUD */
  .hud{
    position:absolute; inset:12px 12px auto 12px;
    display:flex; justify-content:space-between; align-items:center;
    font-weight:700; letter-spacing:.3px;
    text-shadow:0 2px 0 #0007, 0 0 8px #0007;
  }
  .pill{
    display:inline-flex; align-items:center; gap:.5rem;
    padding:8px 12px;
    border-radius:12px;
    background:#00000055;
    outline:2px solid #ffffff1a;
    box-shadow:inset 0 0 0 2px #00000055, 0 2px 6px #0008;
    font-variant-numeric: tabular-nums;
  }
  .pill .dot{width:8px;height:8px;background:var(--green);box-shadow:0 0 8px var(--green);}

  /* 별 (도트 스타일) */
  .star{
    position:absolute;
    top:-24px;
    width:10px; height:10px;
    /* 도트감: 작은 정사각형 + 외곽 픽셀 + 글로우 */
    background: var(--accent);
    box-shadow:
      0 0 0 2px var(--accent-edge),
      0 0 10px 2px #ffe88a;
    outline:1px solid #0006;
    image-rendering: pixelated;
    transform: translateY(0);
    will-change: transform, opacity;
    cursor:pointer;
    border-radius:2px; /* 살짝 둥근 8비트 느낌 */
    animation: fall linear forwards;
  }
  /* 별 꼬리 (살짝) */
  .star::after{
    content:"";
    position:absolute;
    right:50%; top:50%;
    width:2px;height:2px;background:#fff8;
    box-shadow:
      -4px 2px 0 0 #fff5,
      -8px 3px 0 0 #fff3,
      -12px 4px 0 0 #fff2;
    transform: translate(50%,-50%) rotate(-10deg);
    filter: blur(.2px);
    pointer-events:none;
  }
  @keyframes fall {
    to { transform: translateY(calc(100% + 60px)); opacity:.95; }
  }

  /* 클릭 시 팝 이펙트 */
  .pop {
    animation: pop .25s ease-out forwards;
  }
  @keyframes pop{
    50%{ transform: scale(1.35); }
    100%{ transform: scale(.8); opacity:0; }
  }

  /* “Make a wish!” 토스트 */
  .wish{
    position:absolute;
    padding:6px 10px;
    font-weight:800;
    font-size:14px;
    color:#1b1230;
    background:linear-gradient(180deg, #fff 0%, #ffe8f1 100%);
    border:2px solid #ffd1e2;
    border-radius:10px;
    box-shadow:0 2px 0 #ffb5cf, 0 10px 20px #0006, inset 0 0 0 2px #ffffffaa;
    white-space:nowrap;
    pointer-events:none;
    transform: translate(-50%,-50%);
    animation: rise .7s ease-out forwards;
  }
  @keyframes rise{
    0%{ opacity:0; transform: translate(-50%, -30%) scale(.9); }
    12%{ opacity:1; }
    100%{ opacity:0; transform: translate(-50%,-110%) scale(1.02); }
  }

  /* 스타트/엔드 오버레이 */
  .overlay{
    position:absolute; inset:0;
    display:grid; place-items:center;
    background: linear-gradient(#02061855, #02061899);
    backdrop-filter: blur(2px);
  }
  .panel{
    text-align:center;
    background:#0f1638;
    border:3px solid #24306b;
    border-radius:16px;
    padding:22px 20px;
    box-shadow:0 14px 30px #0008, inset 0 0 0 2px #0005;
  }
  .title{
    font-weight:900; font-size:24px; margin:0 0 10px 0;
    text-shadow:0 2px 0 #0008, 0 0 10px #6ca0ff33;
  }
  .subtitle{opacity:.9; margin:0 0 18px 0;}
  .btn{
    display:inline-block; padding:10px 18px; border-radius:12px;
    font-weight:900; letter-spacing:.3px;
    background:linear-gradient(180deg, #a6e0ff, #6fc3ff);
    border:2px solid #1e78ff;
    color:#052a54;
    box-shadow:0 3px 0 #0a55b6, 0 10px 20px #0007;
    transform: translateY(0);
  }
  .btn:active{ transform: translateY(2px); box-shadow:0 1px 0 #0a55b6, 0 6px 14px #0007; }

  /* 별도의 작은 별 배경(장식) */
  .bg-star{
    position:absolute; width:2px;height:2px; background:#fff8;
    border-radius:1px; box-shadow:0 0 6px #fff8;
    animation: twinkle 2.2s ease-in-out infinite;
  }
  @keyframes twinkle{
    50%{ transform: scale(1.6); opacity:.6; }
  }

  /* 접근성 숨김 텍스트 */
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
</style>
</head>
<body>
  <div id="game" aria-label="별똥별 잡기 게임 영역">
    <div class="hud" aria-live="polite">
      <div class="pill" id="scorePill" title="점수">
        <span class="dot" aria-hidden="true"></span>
        <span>Score&nbsp;</span><span id="score">0</span>
      </div>
      <div class="pill" id="timePill" title="남은 시간">
        ⏱&nbsp;<span id="time">20.0</span>s
      </div>
    </div>

    <!-- 장식용 작은 별들 -->
    <div id="bgLayer" aria-hidden="true"></div>

    <!-- 오버레이(시작/종료) -->
    <div id="overlay" class="overlay">
      <div class="panel">
        <h1 class="title">🌠 별똥별 잡기</h1>
        <p class="subtitle">20초 안에 가능한 많이 클릭해보세요!<br><small>디자인: 귀엽고 심플한 도트 스타일</small></p>
        <button id="startBtn" class="btn" type="button">시작하기</button>
      </div>
    </div>

    <!-- SR 전용 상태 -->
    <div class="sr-only" id="srStatus" aria-live="polite"></div>
  </div>

<script>
(() => {
  const game = document.getElementById('game');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const scoreEl = document.getElementById('score');
  const timeEl = document.getElementById('time');
  const srStatus = document.getElementById('srStatus');
  const bgLayer = document.getElementById('bgLayer');

  // --- Config ---
  const DURATION = 20_000;                 // 20초
  const SPAWN_MIN_MS = 280;
  const SPAWN_MAX_MS = 550;
  const SPEED_MIN_S = 2.8;
  const SPEED_MAX_S = 5.8;
  const STAR_MIN = 8;                      // px
  const STAR_MAX = 14;                     // px

  let playing = false;
  let score = 0;
  let startTime = 0;
  let rafId = null;
  let spawnTimeout = null;

  // 배경용 작은 별 뿌리기
  function seedBackground(){
    const rect = game.getBoundingClientRect();
    const count = Math.floor((rect.width * rect.height) / 9000); // 화면크기 비례
    const frag = document.createDocumentFragment();
    for(let i=0;i<count;i++){
      const s = document.createElement('i');
      s.className = 'bg-star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top  = Math.random() * 100 + '%';
      s.style.animationDelay = (Math.random()*2).toFixed(2)+'s';
      frag.appendChild(s);
    }
    bgLayer.appendChild(frag);
  }
  seedBackground();
  window.addEventListener('resize', () => {
    bgLayer.innerHTML = '';
    seedBackground();
  });

  // 유틸
  const rand = (a,b) => a + Math.random()*(b-a);
  const between = (min,max) => Math.floor(rand(min, max));

  // 별 생성
  function spawnStar(){
    if(!playing) return;

    const star = document.createElement('button');
    star.className = 'star';
    star.setAttribute('aria-label','별 잡기');
    star.type = 'button';

    // 랜덤 위치/크기/속도
    const gRect = game.getBoundingClientRect();
    const size = between(STAR_MIN, STAR_MAX);
    const left = Math.max(8, Math.min(gRect.width - size - 8, rand(6, gRect.width - 6)));
    const duration = rand(SPEED_MIN_S, SPEED_MAX_S).toFixed(2) + 's';

    star.style.left = left + 'px';
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.animationDuration = duration;

    // 자동 제거(바닥 도착)
    star.addEventListener('animationend', () => star.remove(), { once:true });

    // 클릭 처리
    star.addEventListener('click', (e) => {
      if(!playing) return;
      e.stopPropagation();
      score++;
      scoreEl.textContent = score;
      srStatus.textContent = `점수 ${score}`;
      star.classList.add('pop');
      setTimeout(() => star.remove(), 180);
      showWish(e.clientX, e.clientY);
      // 가끔 보너스 별 한번 더 소환
      if (Math.random() < 0.15) queuedSpawn(120);
    }, { passive:true });

    game.appendChild(star);

    // 다음 소환 예약
    queuedSpawn(between(SPAWN_MIN_MS, SPAWN_MAX_MS));
  }

  function queuedSpawn(ms){
    if(!playing) return;
    clearTimeout(spawnTimeout);
    spawnTimeout = setTimeout(spawnStar, ms);
  }

  // "Make a wish!" 토스트
  function showWish(clientX, clientY){
    const wish = document.createElement('div');
    wish.className = 'wish';
    wish.textContent = 'Make a wish!';
    const rect = game.getBoundingClientRect();
    const x = Math.max(24, Math.min(rect.width - 24, clientX - rect.left));
    const y = Math.max(40, Math.min(rect.height - 40, clientY - rect.top));
    wish.style.left = x + 'px';
    wish.style.top  = y + 'px';
    game.appendChild(wish);
    setTimeout(() => wish.remove(), 720);
  }

  // 타이머 표시(부드러운 카운트다운)
  function tick(){
    if(!playing) return;
    const elapsed = performance.now() - startTime;
    const remain = Math.max(0, DURATION - elapsed);
    timeEl.textContent = (remain/1000).toFixed(1);
    if (remain <= 0){
      endGame();
      return;
    }
    rafId = requestAnimationFrame(tick);
  }

  function startGame(){
    // 초기화
    playing = true;
    score = 0;
    scoreEl.textContent = '0';
    timeEl.textContent = (DURATION/1000).toFixed(1);
    startTime = performance.now();

    // 기존 별 제거
    [...game.querySelectorAll('.star,.wish')].forEach(n => n.remove());

    overlay.style.display = 'none';
    queuedSpawn(200);
    rafId = requestAnimationFrame(tick);
  }

  function endGame(){
    playing = false;
    clearTimeout(spawnTimeout);
    cancelAnimationFrame(rafId);
    // 남은 별/토스트 정리
    [...game.querySelectorAll('.star,.wish')].forEach(n => n.remove());

    // 결과 오버레이 갱신/노출
    overlay.innerHTML = `
      <div class="panel" role="dialog" aria-modal="true">
        <h2 class="title">✨ 결과</h2>
        <p class="subtitle">최종 점수: <strong style="font-size:22px">${score}</strong></p>
        <button class="btn" id="retryBtn" type="button">다시하기</button>
      </div>`;
    overlay.style.display = 'grid';
    overlay.querySelector('#retryBtn').addEventListener('click', startGame);
  }

  startBtn.addEventListener('click', startGame);
  // 키보드로도 시작 가능
  window.addEventListener('keydown', (e) => {
    if(!playing && (e.key === ' ' || e.key === 'Enter')) startGame();
  });
})();
</script>
</body>
</html>
